<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREACH - Multi-Agent System</title>
<style>
  body { background: #070708; color: #a0a5b5; font-family: monospace; padding: 15px; margin: 0; overflow: hidden; user-select: none; }
  #interface { background: #0f1015; padding: 15px; border: 1px solid #222530; display: flex; gap: 15px; align-items: center; margin-bottom: 10px; }
  button { background: #1c1d26; color: #fff; border: 1px solid #32374a; padding: 6px 12px; cursor: pointer; font-family: monospace; font-weight: bold; }
  button:hover { background: #252733; border-color: #434961; }
  input { background: #020203; color: #ffcc44; border: 1px solid #32374a; padding: 6px; font-family: monospace; width: 100px; text-transform: uppercase; text-align: center;}
  #status { font-size: 11px; color: #62687d; }
  #frame-container { position: relative; }
  canvas { background: #020203; display: block; border: 1px solid #1c1d26; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
</style>
</head>
<body>

  <div id="interface">
    <button id="btnCreate">HOST LOBBY</button>
    <div>
      <input type="text" id="roomInput" placeholder="CODE">
      <button id="btnJoin">JOIN LOBBY</button>
    </div>
    <div id="status">SYS // DISCONNECTED</div>
  </div>

  <div id="frame-container">
    <canvas id="gameCanvas" width="960" height="640"></canvas>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, addDoc, collection, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_4CLZMLNn5ymIe5y64pAtQ4Kz7ZJhp8Y",
      authDomain: "don-t-leave-me-alone.firebaseapp.com",
      projectId: "don-t-leave-me-alone",
      storageBucket: "don-t-leave-me-alone.firebasestorage.app",
      messagingSenderId: "74557251120",
      appId: "1:74557251120:web:72f4b31d2698ec38b597f5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    let peerConnection = null;
    let dataChannel = null;
    let isHost = false;
    let networkConnected = false;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    const cacheCanvas = document.createElement('canvas');
    cacheCanvas.width = canvas.width;
    cacheCanvas.height = canvas.height;
    const cacheCtx = cacheCanvas.getContext('2d');

    const MOVE_SPEED = 4;
    const BULLET_SPEED = 12;
    const keysPressed = {};
    const mousePos = { x: 0, y: 0 };
    let clickTriggered = false;

    let rooms = [];
    let walls = [];
    let boxes = [];
    let doors = [];
    let enemies = [];
    let bullets = [];
    let particles = [];

    const player1 = { id: 'host', x: 100, y: 120, angle: 0, hp: 100, maxHp: 100, size: 14, color: '#ff4444', isDead: false };
    const player2 = { id: 'client', x: 140, y: 120, angle: 0, hp: 100, maxHp: 100, size: 14, color: '#33ff33', isDead: false };
    
    const clientInputs = { keys: {}, mouse: { x: 0, y: 0 }, click: false };

    const interpTargets = {
      p1: { x: 100, y: 120, angle: 0, hp: 100, isDead: false },
      p2: { x: 140, y: 120, angle: 0, hp: 100, isDead: false },
      enemies: [],
      bullets: [],
      doors: [],
      boxes: []
    };

    // -- MAP GENERATOR (BUG FIXES APPLIED) --
    function generateProceduralMap() {
      walls = []; boxes = []; doors = []; rooms = []; enemies = []; bullets = []; particles = [];
      
      // Fixed Spawn Anchor positions
      player1.x = 100; player1.y = 120; player1.hp = 100; player1.isDead = false;
      player2.x = 140; player2.y = 120; player2.hp = 100; player2.isDead = false;

      rooms = [
        { x: 60, y: 60, w: 240, h: 180 },   // Spawn Room (Room 1)
        { x: 660, y: 60, w: 240, h: 180 },  // Room 2
        { x: 360, y: 220, w: 240, h: 200 }, // Center Courtyard Room 3
        { x: 60, y: 380, w: 220, h: 180 },  // Room 4
        { x: 660, y: 380, w: 240, h: 200 }  // Room 5
      ];

      // Outer Map Boundaries
      walls.push({ x: 0, y: 0, w: canvas.width, h: 20 });
      walls.push({ x: 0, y: canvas.height - 20, w: canvas.width, h: 20 });
      walls.push({ x: 0, y: 0, w: 20, h: canvas.height });
      walls.push({ x: canvas.width - 20, y: 0, w: 20, h: canvas.height });

      // Build Rooms with dynamic door cutouts (gaps in walls)
      rooms.forEach((r, idx) => {
        // Room 1 (Spawn) Wall segmenting with a gap on the right wall for Door 1
        if (idx === 0) {
          walls.push({ x: r.x, y: r.y, w: r.w, h: 12 }); // Top
          walls.push({ x: r.x, y: r.y + r.h - 12, w: r.w, h: 12 }); // Bottom
          walls.push({ x: r.x, y: r.y, w: 12, h: r.h }); // Left
          walls.push({ x: r.x + r.w - 12, y: r.y, w: 12, h: 60 }); // Right (Top part)
          walls.push({ x: r.x + r.w - 12, y: r.y + 120, w: 12, h: 60 }); // Right (Bottom part - leaves gap at y=120)
        }
        // Room 2 Wall segmenting with a gap on the left wall for Door 2
        else if (idx === 1) {
          walls.push({ x: r.x, y: r.y, w: r.w, h: 12 });
          walls.push({ x: r.x, y: r.y + r.h - 12, w: r.w, h: 12 });
          walls.push({ x: r.x, y: r.y, w: 12, h: 60 }); // Left (Top part)
          walls.push({ x: r.x, y: r.y + 120, w: 12, h: 60 }); // Left (Bottom part - leaves gap at y=120)
          walls.push({ x: r.x + r.w - 12, y: r.y, w: 12, h: r.h });
        }
        // Room 3 (Center) Wall segmenting with a gap on the bottom wall for Door 3
        else if (idx === 2) {
          walls.push({ x: r.x, y: r.y, w: r.w, h: 12 });
          walls.push({ x: r.x, y: r.y + r.h - 12, w: 110, h: 12 }); // Bottom (Left part)
          walls.push({ x: r.x + 150, y: r.y + r.h - 12, w: 90, h: 12 }); // Bottom (Right part - leaves gap at x=470)
          walls.push({ x: r.x, y: r.y, w: 12, h: r.h });
          walls.push({ x: r.x + r.w - 12, y: r.y, w: 12, h: r.h });
        }
        // Standard full walls for Rooms 4 & 5
        else {
          walls.push({ x: r.x, y: r.y, w: r.w, h: 12 });
          walls.push({ x: r.x, y: r.y + r.h - 12, w: r.w, h: 12 });
          walls.push({ x: r.x, y: r.y, w: 12, h: r.h });
          walls.push({ x: r.x + r.w - 12, y: r.y, w: 12, h: r.h });
        }

        // Spawn boxes with Player Spawn Validation
        for(let i = 0; i < 3; i++) {
          let boxX = r.x + 30 + Math.random() * (r.w - 80);
          let boxY = r.y + 30 + Math.random() * (r.h - 80);
          
          // Fix: Verify box is away from Player 1 and Player 2 spawn point
          let distToP1 = Math.hypot(boxX - 100, boxY - 120);
          let distToP2 = Math.hypot(boxX - 140, boxY - 120);
          
          if (distToP1 > 60 && distToP2 > 60) {
            boxes.push({ id: 'box_' + Math.random(), x: boxX, y: boxY, w: 24, h: 24, hp: 40 });
          } else {
            i--; // Retry box position generation if inside player safety zone
          }
        }
      });

      // Align interactive doors precisely inside the created wall gaps
      doors.push({ id: 'd1', x: 288, y: 120, w: 12, h: 60, open: false, lerpOpen: 0 }); // Fits Room 1 Right Gap
      doors.push({ id: 'd2', x: 660, y: 120, w: 12, h: 60, open: false, lerpOpen: 0 }); // Fits Room 2 Left Gap
      doors.push({ id: 'd3', x: 470, y: 408, w: 40, h: 12, open: false, lerpOpen: 0 }); // Fits Room 3 Bottom Gap

      // Place Enemies safely inside non-spawn rooms
      enemies = [
        { id: 'e1', x: 760, y: 140, hp: 50, speed: 1.5, size: 12 },
        { id: 'e2', x: 480, y: 300, hp: 50, speed: 1.5, size: 12 },
        { id: 'e3', x: 160, y: 460, hp: 50, speed: 1.5, size: 12 }
      ];

      preRenderStaticScenery();
    }

    function preRenderStaticScenery() {
      cacheCtx.fillStyle = '#020203';
      cacheCtx.fillRect(0, 0, cacheCanvas.width, cacheCanvas.height);

      cacheCtx.strokeStyle = '#0e0f14';
      cacheCtx.lineWidth = 1;
      for (let i = 0; i < cacheCanvas.width; i += 32) {
        cacheCtx.beginPath(); cacheCtx.moveTo(i, 0); cacheCtx.lineTo(i, cacheCanvas.height); cacheCtx.stroke();
      }
      for (let j = 0; j < cacheCanvas.height; j += 32) {
        cacheCtx.beginPath(); cacheCtx.moveTo(0, j); cacheCtx.lineTo(cacheCanvas.width, j); cacheCtx.stroke();
      }

      rooms.forEach(r => {
        cacheCtx.fillStyle = '#090a0f';
        cacheCtx.fillRect(r.x, r.y, r.w, r.h);
      });

      cacheCtx.fillStyle = '#1c1d26';
      walls.forEach(w => {
        cacheCtx.fillRect(w.x, w.y, w.w, w.h);
        cacheCtx.strokeStyle = '#2d3142';
        cacheCtx.strokeRect(w.x, w.y, w.w, w.h);
      });
    }

    function checkCollision(entity, size, targetX, targetY) {
      for (let w of walls) {
        if (targetX + size > w.x && targetX - size < w.x + w.w &&
            targetY + size > w.y && targetY - size < w.y + w.h) {
          return true;
        }
      }
      for (let b of boxes) {
        if (targetX + size > b.x && targetX - size < b.x + b.w &&
            targetY + size > b.y && targetY - size < b.y + b.h) {
          return true;
        }
      }
      for (let d of doors) {
        if (!d.open) {
          if (targetX + size > d.x && targetX - size < d.x + d.w &&
              targetY + size > d.y && targetY - size < d.y + d.h) {
            return true;
          }
        }
      }
      return false;
    }

    window.addEventListener('keydown', e => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keysPressed[e.key.toLowerCase()] = false; });
    
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mousePos.x = e.clientX - rect.left;
      mousePos.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', e => { if (e.button === 0) clickTriggered = true; });
    canvas.addEventListener('mouseup', e => { if (e.button === 0) clickTriggered = false; });

    function runHostPhysicsTick() {
      processAgentMovement(player1, keysPressed);
      player1.angle = Math.atan2(mousePos.y - player1.y, mousePos.x - player1.x);

      if (networkConnected) {
        processAgentMovement(player2, clientInputs.keys);
        player2.angle = Math.atan2(clientInputs.mouse.y - player2.y, clientInputs.mouse.x - player2.x);
      }

      if (clickTriggered && !player1.isDead) spawnBullet(player1, mousePos);
      if (clientInputs.click && networkConnected && !player2.isDead) spawnBullet(player2, clientInputs.mouse);

      clientInputs.click = false; 

      // Automated Sliding Doors Proximity Range check
      doors.forEach(d => {
        let nearHost = Math.hypot(player1.x - (d.x + d.w/2), player1.y - (d.y + d.h/2)) < 50;
        let nearClient = networkConnected && Math.hypot(player2.x - (d.x + d.w/2), player2.y - (d.y + d.h/2)) < 50;
        d.open = (nearHost || nearClient);
        d.lerpOpen += ((d.open ? 1 : 0) - d.lerpOpen) * 0.15;
      });

      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;

        let hitWall = checkCollision(b, 2, b.x, b.y);
        
        if (!hitWall) {
          for(let box of boxes) {
            if (b.x > box.x && b.x < box.x + box.w && b.y > box.y && b.y < box.y + box.h) {
              box.hp -= 15; hitWall = true;
              createExplosionParticles(b.x, b.y, '#9e7343');
              break;
            }
          }
        }

        if (!hitWall) {
          for (let e of enemies) {
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
              e.hp -= 20; hitWall = true;
              createExplosionParticles(b.x, b.y, '#ffffff');
              break;
            }
          }
        }

        if (!hitWall && b.owner !== 'host' && !player1.isDead && Math.hypot(b.x - player1.x, b.y - player1.y) < player1.size) {
          player1.hp -= 10; hitWall = true;
          createExplosionParticles(b.x, b.y, player1.color);
          if(player1.hp <= 0) player1.isDead = true;
        }
        if (!hitWall && b.owner !== 'client' && networkConnected && !player2.isDead && Math.hypot(b.x - player2.x, b.y - player2.y) < player2.size) {
          player2.hp -= 10; hitWall = true;
          createExplosionParticles(b.x, b.y, player2.color);
          if(player2.hp <= 0) player2.isDead = true;
        }

        if (hitWall || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
          bullets.splice(i, 1);
        }
      }

      boxes = boxes.filter(b => b.hp > 0);

      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        if (e.hp <= 0) {
          createExplosionParticles(e.x, e.y, '#ff4444', 15);
          enemies.splice(i, 1);
          continue;
        }

        let target = player1;
        if (networkConnected && !player2.isDead && (player1.isDead || Math.hypot(player2.x - e.x, player2.y - e.y) < Math.hypot(player1.x - e.x, player1.y - e.y))) {
          target = player2;
        }

        if (target && !target.isDead) {
          let angle = Math.atan2(target.y - e.y, target.x - e.x);
          let nX = e.x + Math.cos(angle) * e.speed;
          let nY = e.y + Math.sin(angle) * e.speed;
          
          if (!checkCollision(e, e.size, nX, nY)) {
            e.x = nX; e.y = nY;
          }

          if (Math.hypot(target.x - e.x, target.y - e.y) < target.size + e.size) {
            target.hp -= 0.4;
            if(target.hp <= 0) target.isDead = true;
          }
        }
      }

      updateParticlesSystem();

      if (networkConnected && dataChannel.readyState === 'open') {
        const statePayload = {
          p1: { x: player1.x, y: player1.y, angle: player1.angle, hp: player1.hp, isDead: player1.isDead },
          p2: { x: player2.x, y: player2.y, angle: player2.angle, hp: player2.hp, isDead: player2.isDead },
          enemies: enemies.map(e => ({ x: e.x, y: e.y, size: e.size })),
          bullets: bullets.map(b => ({ x: b.x, y: b.y })),
          doors: doors.map(d => ({ id: d.id, lerpOpen: d.lerpOpen })),
          boxes: boxes.map(b => ({ x: b.x, y: b.y, w: b.w, h: b.h }))
        };
        dataChannel.send(JSON.stringify({ type: 'SNAPSHOT', payload: statePayload }));
      }
    }

    function processAgentMovement(agent, inputs) {
      if (agent.isDead) return;
      let dx = 0, dy = 0;
      if (inputs['w'] || inputs['arrowup']) dy -= 1;
      if (inputs['s'] || inputs['arrowdown']) dy += 1;
      if (inputs['a'] || inputs['arrowleft']) dx -= 1;
      if (inputs['d'] || inputs['arrowright']) dx += 1;

      if (dx !== 0 || dy !== 0) {
        const len = Math.sqrt(dx*dx + dy*dy);
        const nX = agent.x + (dx / len) * MOVE_SPEED;
        const nY = agent.y + (dy / len) * MOVE_SPEED;

        if (!checkCollision(agent, agent.size, nX, agent.y)) agent.x = nX;
        if (!checkCollision(agent, agent.size, agent.x, nY)) agent.y = nY;
      }
    }

    function spawnBullet(ownerObj, targetPos) {
      if (ownerObj.lastFire && Date.now() - ownerObj.lastFire < 200) return;
      ownerObj.lastFire = Date.now();

      const angle = Math.atan2(targetPos.y - ownerObj.y, targetPos.x - ownerObj.x);
      bullets.push({
        x: ownerObj.x + Math.cos(angle) * ownerObj.size,
        y: ownerObj.y + Math.sin(angle) * ownerObj.size,
        vx: Math.cos(angle) * BULLET_SPEED,
        vy: Math.sin(angle) * BULLET_SPEED,
        owner: ownerObj.id
      });
    }

    function createExplosionParticles(x, y, color, count = 5) {
      for(let i=0; i<count; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          life: 20, maxLife: 20, color: color
        });
      }
    }

    function updateParticlesSystem() {
      for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function transmitClientInputUpstream() {
      if (networkConnected && dataChannel.readyState === 'open') {
        const localInputMap = {
          keys: {
            w: keysPressed['w'] || keysPressed['arrowup'],
            s: keysPressed['s'] || keysPressed['arrowdown'],
            a: keysPressed['a'] || keysPressed['arrowleft'],
            d: keysPressed['d'] || keysPressed['arrowright']
          },
          mouse: mousePos,
          click: clickTriggered
        };
        dataChannel.send(JSON.stringify({ type: 'INPUT', payload: localInputMap }));
        clickTriggered = false;
      }
    }

    function engineFrameLoop() {
      if (isHost) {
        runHostPhysicsTick();
        interpTargets.p1 = player1;
        interpTargets.p2 = player2;
        interpTargets.enemies = enemies;
        interpTargets.bullets = bullets;
        interpTargets.doors = doors;
        interpTargets.boxes = boxes;
      } else {
        transmitClientInputUpstream();
        updateParticlesSystem();
      }

      ctx.drawImage(cacheCanvas, 0, 0);

      interpTargets.boxes.forEach(b => {
        ctx.fillStyle = '#5c4028';
        ctx.strokeStyle = '#3d2a1a';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeRect(b.x, b.y, b.w, b.h);
      });

      interpTargets.doors.forEach(d => {
        let isHorizontal = (d.id === 'd3');
        let w = isHorizontal ? 40 : 12;
        let h = isHorizontal ? 12 : 60;
        
        ctx.fillStyle = '#3a4f6e';
        ctx.strokeStyle = '#233247';
        
        if (isHorizontal) {
          let currentW = w * (1 - d.lerpOpen);
          if (currentW > 0) {
            ctx.fillRect(d.x, d.y, currentW, h);
            ctx.strokeRect(d.x, d.y, currentW, h);
          }
        } else {
          let currentH = h * (1 - d.lerpOpen);
          if (currentH > 0) {
            ctx.fillRect(d.x, d.y, w, currentH);
            ctx.strokeRect(d.x, d.y, w, currentH);
          }
        }
      });

      interpTargets.bullets.forEach(b => {
        ctx.fillStyle = '#ffcc44';
        ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
      });

      interpTargets.enemies.forEach(e => {
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size || 12, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#220000'; ctx.stroke();
      });

      if (!interpTargets.p1.isDead) renderAgent(interpTargets.p1, player1.color);
      if (!interpTargets.p2.isDead) renderAgent(interpTargets.p2, player2.color);

      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillRect(p.x, p.y, 3, 3);
      });
      ctx.globalAlpha = 1.0;

      requestAnimationFrame(engineFrameLoop);
    }

    function renderAgent(target, color) {
      ctx.save();
      ctx.translate(target.x, target.y);
      ctx.rotate(target.angle);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(4, -3, 12, 6);
      ctx.restore();

      ctx.fillStyle = '#222'; ctx.fillRect(target.x - 15, target.y - 24, 30, 4);
      ctx.fillStyle = color; ctx.fillRect(target.x - 15, target.y - 24, 30 * (target.hp / 100), 4);
    }

    function attachChannelPipelines() {
      dataChannel.onopen = () => {
        networkConnected = true;
        statusText.textContent = `SYS // CHANNEL ACTIVE [${isHost ? 'HOST' : 'CLIENT'}]`;
        statusText.style.color = "#33ff33";
        if (isHost) generateProceduralMap();
      };

      dataChannel.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (isHost && msg.type === 'INPUT') {
          clientInputs.keys = msg.payload.keys;
          clientInputs.mouse = msg.payload.mouse;
          if (msg.payload.click) clientInputs.click = true;
        } 
        if (!isHost && msg.type === 'SNAPSHOT') {
          const snap = msg.payload;
          interpTargets.p1 = snap.p1;
          interpTargets.p2 = snap.p2;
          interpTargets.enemies = snap.enemies;
          interpTargets.bullets = snap.bullets;
          interpTargets.doors = snap.doors;
          interpTargets.boxes = snap.boxes;
          
          if(snap.bullets.length > 0) {
             snap.bullets.forEach(sb => { if(Math.random() > 0.7) createExplosionParticles(sb.x, sb.y, '#ffcc44', 1); });
          }
        }
      };
    }

    document.getElementById('btnCreate').addEventListener('click', async () => {
      isHost = true;
      statusText.textContent = "SYS // CONFIGURING WEB_RTC...";
      peerConnection = new RTCPeerConnection(rtcConfig);
      dataChannel = peerConnection.createDataChannel('game-payload', { ordered: false, maxRetransmits: 0 });
      attachChannelPipelines();

      const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
      const roomDoc = doc(db, 'rooms', roomId);
      const candidatesCol = collection(roomDoc, 'candidates');

      peerConnection.addEventListener('icecandidate', e => {
        if (e.candidate) addDoc(candidatesCol, { ...e.candidate.toJSON(), type: 'host' });
      });

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await setDoc(roomDoc, { offer: { type: offer.type, sdp: offer.sdp } });

      document.getElementById('interface').innerHTML = `<h3>ROOM ID: <span style="color:#ffcc44">${roomId}</span></h3><div id="status">SYS // OPEN_LINK_WAITING...</div>`;
      statusText.textContent = "SYS // ESTABLISHING LOCAL SIMULATION LOBBY...";

      onSnapshot(roomDoc, snapshot => {
        const data = snapshot.data();
        if (!peerConnection.currentRemoteDescription && data?.answer) {
          peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
      });

      onSnapshot(candidatesCol, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added') {
            const data = change.doc.data();
            if (data.type === 'client') peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
      
      generateProceduralMap();
    });

    document.getElementById('btnJoin').addEventListener('click', async () => {
      const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
      if (!roomId) return alert("EMPTY CODE POINTER ERROR");

      isHost = false;
      statusText.textContent = "SYS // HANDSHAKING REMOTE SIGNAL...";
      
      generateProceduralMap(); 

      const roomDoc = doc(db, 'rooms', roomId);
      const candidatesCol = collection(roomDoc, 'candidates');
      const roomSnapshot = await getDoc(roomDoc);

      if (!roomSnapshot.exists()) return alert("SIGNAL MATRIX MISSED: ROOM NOT FOUND");

      peerConnection = new RTCPeerConnection(rtcConfig);
      peerConnection.addEventListener('datachannel', e => {
        dataChannel = e.channel;
        attachChannelPipelines();
      });

      peerConnection.addEventListener('icecandidate', e => {
        if (e.candidate) addDoc(candidatesCol, { ...e.candidate.toJSON(), type: 'client' });
      });

      const roomData = roomSnapshot.data();
      await peerConnection.setRemoteDescription(new RTCSessionDescription(roomData.offer));

      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      await setDoc(roomDoc, { answer: { type: answer.type, sdp: answer.sdp } }, { merge: true });

      onSnapshot(candidatesCol, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added') {
            const data = change.doc.data();
            if (data.type === 'host') peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
    });

    generateProceduralMap();
    requestAnimationFrame(engineFrameLoop);
  </script>
</body>
</html>
